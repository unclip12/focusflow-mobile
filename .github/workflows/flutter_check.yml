name: Flutter Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: flutter pub get + analyze + APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      # Generate android/ + ios/ folders without overwriting existing Dart files
      - name: Generate native platform folders
        run: flutter create . --project-name focusflow_mobile --org com.focusflow

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: flutter build apk (debug)
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
